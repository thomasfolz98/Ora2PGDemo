# Oracle-Verbindung
ORACLE_HOME /opt/oracle/instantclient_21_12
ORACLE_DSN  dbi:Oracle:host=oracle;service_name=XEPDB1;port=1521
ORACLE_USER app_demo
ORACLE_PWD  app_demo

# Zu exportierendes Schema
SCHEMA APP_DEMO

# Ohne sysdba-Rechte: User-Grants-Views nutzen
USER_GRANTS 1
PG_VERSION  15

# Export-Zielverzeichnis (im Container unter /config)
OUTPUT_DIR /config-advanced/output

# PostgreSQL-Ziel
PG_DSN  dbi:Pg:dbname=demo;host=postgres;port=5432
PG_USER demo
PG_PWD  demo

# Ziel-Schema in PostgreSQL
PG_SCHEMA app_demo

# Package-Objekte als eigenes Schema ausgeben (pkg_faktura.<func>)
PACKAGE_AS_SCHEMA 1
