services:

  oracle:
    image: gvenzl/oracle-xe:21-slim
    platform: linux/amd64
    container_name: oracle-xe
    ports:
      - "1521:1521"
      - "5500:5500"
    environment:
      ORACLE_PASSWORD: oracle
      APP_USER: app
      APP_USER_PASSWORD: app
    volumes:
      - ./docker/oracle/data:/opt/oracle/oradata
      - ./docker/oracle/init:/container-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 15
      start_period: 60s

  postgres:
    image: postgres:15
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo
      POSTGRES_DB: demo
    volumes:
      - ./docker/postgres/data:/var/lib/postgresql/data

  # Ora2Pg fuer die Basic-Demo (app_basic_demo)
  ora2pg-basic:
    build:
      context: ./docker/ora2pg
    platform: linux/amd64
    container_name: ora2pg-basic
    volumes:
      - ./basic/migration:/config
    depends_on:
      oracle:
        condition: service_healthy
      postgres:
        condition: service_started

  # Ora2Pg fuer die Advanced-Demo (app_demo + pkg_faktura)
  ora2pg-advanced:
    build:
      context: ./docker/ora2pg
    platform: linux/amd64
    container_name: ora2pg-advanced
    volumes:
      - ./advanced/migration:/config
    depends_on:
      oracle:
        condition: service_healthy
      postgres:
        condition: service_started

  # API fuer Basic-Demo (Port 8081)
  api-basic:
    build:
      context: ./basic/api
    container_name: oracledemo-api-basic
    environment:
      DB_DSN: postgresql://demo:demo@postgres:5432/demo
    ports:
      - "8081:8000"
    depends_on:
      postgres:
        condition: service_started
    restart: unless-stopped

  # API fuer Advanced-Demo (Port 8080)
  api-advanced:
    build:
      context: ./advanced/api
    container_name: oracledemo-api-advanced
    environment:
      DB_DSN: postgresql://demo:demo@postgres:5432/demo
    ports:
      - "8080:8000"
    depends_on:
      postgres:
        condition: service_started
    restart: unless-stopped
